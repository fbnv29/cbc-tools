<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050608" />
    <title>CBC Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap"
    />
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <header class="portal-topbar">
      <a class="brand-lockup" href="./" aria-label="CBC Tools">
        <span class="brand-mark" aria-hidden="true">
          <img src="./MET_CBC/assets/cbc-mark.png" alt="" />
        </span>
        <span>
          <strong>CBC TOOLS</strong>
        </span>
      </a>
    </header>

    <main class="portal-shell">
      <section class="hero-band" aria-labelledby="portal-title">
        <div class="hero-copy">
          <h1 id="portal-title">Centro operativo CBC</h1>
        </div>
      </section>

      <section class="module-section" aria-labelledby="modules-title">
        <h2 id="modules-title" class="sr-only">Aplicaciones</h2>

        <div class="module-grid">
          <article class="module-card module-card-primary">
            <div class="module-number">01</div>
            <div class="module-content">
              <div class="module-header">
                <h3>CHANELS CBC</h3>
              </div>
            </div>
            <div class="module-actions">
              <a class="button button-primary" href="https://canales-cbc.netlify.app">Abrir app</a>
            </div>
          </article>

          <article class="module-card">
            <div class="module-number">02</div>
            <div class="module-content">
              <div class="module-header">
                <h3>MET CBC</h3>
              </div>
            </div>
            <div class="module-actions">
              <a class="button button-primary" href="./MET_CBC/">Abrir app</a>
            </div>
          </article>

          <article class="module-card">
            <div class="module-number">03</div>
            <div class="module-content">
              <div class="module-header">
                <h3>BOT CBC</h3>
              </div>
            </div>
            <div class="module-actions">
              <a class="button button-primary" href="http://localhost:3000/">Abrir app</a>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
