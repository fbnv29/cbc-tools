<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CeBot — CBC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="chat-card">
      <header class="header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg class="brand-logo cebot-logo" viewBox="0 0 120 120" role="img" aria-label="CeBot">
              <defs>
                <linearGradient id="cebot-bg" x1="15" x2="105" y1="18" y2="105" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#6ac8bb"></stop>
                  <stop offset="1" stop-color="#3f9f94"></stop>
                </linearGradient>
                <linearGradient id="cebot-blue" x1="21" x2="39" y1="52" y2="72" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#55a6d8"></stop>
                  <stop offset="1" stop-color="#347fc2"></stop>
                </linearGradient>
                <linearGradient id="cebot-orange" x1="82" x2="101" y1="53" y2="72" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#ff6537"></stop>
                  <stop offset="1" stop-color="#ff7f43"></stop>
                </linearGradient>
              </defs>
              <rect width="120" height="120" rx="28" fill="url(#cebot-bg)"></rect>
              <path class="headband" d="M32 55a28 28 0 0 1 56 0" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="7"></path>
              <rect x="24" y="50" width="16" height="24" rx="9" fill="url(#cebot-blue)"></rect>
              <rect x="80" y="50" width="16" height="24" rx="9" fill="url(#cebot-orange)"></rect>
              <path d="M48 34h24a20 20 0 0 1 20 20v14a20 20 0 0 1-20 20H56l-12 12a4 4 0 0 1-7-3v-9a20 20 0 0 1-17-20V54a20 20 0 0 1 20-20h8Z" fill="#fff"></path>
              <rect x="35" y="52" width="50" height="24" rx="12" fill="#242626"></rect>
              <path d="M44 63a6 6 0 0 1 12 0M64 63a6 6 0 0 1 12 0" fill="none" stroke="#6ac8bb" stroke-linecap="round" stroke-width="5"></path>
              <path d="M54 70c3 4 9 4 12 0" fill="none" stroke="#6ac8bb" stroke-linecap="round" stroke-width="5"></path>
              <rect x="28" y="82" width="4" height="14" rx="2" fill="#fff"></rect>
              <rect x="38" y="76" width="5" height="26" rx="3" fill="#fff"></rect>
              <rect x="50" y="72" width="5" height="36" rx="3" fill="#55a6d8"></rect>
              <rect x="62" y="78" width="5" height="24" rx="3" fill="#fff"></rect>
              <rect x="74" y="84" width="5" height="15" rx="3" fill="#ff6537"></rect>
              <path d="M89 83v19a10 10 0 1 1-7-10V76l18-7v9l-11 4Z" fill="#fff"></path>
              <circle cx="82" cy="102" r="8" fill="#55a6d8"></circle>
            </svg>
          </div>
          <div>
            <h1 class="title">CeBot</h1>
            <p class="subtitle">Asistente del ministerio de alabanza CBC</p>
          </div>
        </div>
        <div class="status-pill" aria-label="Estado de la interfaz">
          <span class="status-dot" aria-hidden="true"></span>
          CeBot listo
        </div>
      </header>

      <div id="chat" class="chat-area" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <h2>Hola, soy CeBot.</h2>
          <p>Pregúntame sobre canales, retornos, repertorio o datos del ministerio.</p>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <div class="input-group">
          <textarea 
            id="question" 
            name="question" 
            placeholder="Ej: CeBot, ¿qué canal usa la voz principal?"
            rows="1"
            aria-label="Pregunta para CeBot"
            required
          ></textarea>
          <button type="submit" class="btn-send" aria-label="Enviar pregunta">
            <span>Enviar</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
