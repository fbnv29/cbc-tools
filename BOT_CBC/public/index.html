<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CeBot — CBC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="chat-card">
      <header class="header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img class="brand-logo cebot-logo" src="./assets/cebot.png" alt="" />
          </div>
          <div>
            <h1 class="title">CeBot</h1>
            <p class="subtitle">Asistente del ministerio de alabanza CBC</p>
          </div>
        </div>
        <div class="status-pill" aria-label="Estado de la interfaz">
          <span class="status-dot" aria-hidden="true"></span>
          CeBot listo
        </div>
      </header>

      <div id="chat" class="chat-area" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <h2>Hola, soy CeBot.</h2>
          <p>Pregúntame sobre canales, retornos, repertorio o datos del ministerio.</p>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <div class="input-group">
          <textarea 
            id="question" 
            name="question" 
            placeholder="Ej: CeBot, ¿qué canal usa la voz principal?"
            rows="1"
            aria-label="Pregunta para CeBot"
            required
          ></textarea>
          <button type="submit" class="btn-send" aria-label="Enviar pregunta">
            <span>Enviar</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
