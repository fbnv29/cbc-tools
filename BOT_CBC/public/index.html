<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot CBC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="chat-card">
      <header class="header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg class="brand-logo" viewBox="0 0 100 100" role="img" aria-label="CBC">
              <circle cx="50" cy="50" r="50" fill="#4a4a4a"></circle>
              <path d="M45 20v60A30 30 0 0 1 45 20Z" fill="#6ac8bb"></path>
              <path d="M55 20h30v30A30 30 0 0 1 55 20Z" fill="#ff6537"></path>
              <path d="M55 65h30A30 30 0 0 1 55 85Z" fill="#55a6d8"></path>
              <rect x="45" y="20" width="6" height="60" fill="#4a4a4a"></rect>
            </svg>
          </div>
          <div>
            <h1 class="title">Bot CBC</h1>
            <p class="subtitle">Asistente IA para consultar información del grupo de alabanza</p>
          </div>
        </div>
        <div class="status-pill" aria-label="Estado de la interfaz">
          <span class="status-dot" aria-hidden="true"></span>
          Listo para consultar
        </div>
      </header>

      <div id="chat" class="chat-area" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <h2>Haz una pregunta sobre tu base de datos</h2>
          <p>Consulta la información autorizada de la base de datos en modo solo lectura.</p>
        </div>
      </div>

      <form id="chat-form" class="chat-form">
        <div class="input-group">
          <textarea 
            id="question" 
            name="question" 
            placeholder="Ej: ¿Quiénes están asignados este domingo?"
            rows="1"
            aria-label="Pregunta para Bot CBC"
            required
          ></textarea>
          <button type="submit" class="btn-send" aria-label="Enviar pregunta">
            <span>Enviar</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
